name: GPW Daily Quality Check

on:
  schedule:
    # Post-market: 18:30 CET (16:30 UTC) on weekdays
    - cron: '30 16 * * 1-5'
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install --prefix apps/api
      - name: Run unit tests
        run: cd apps/api && npm test

  quality-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --prefix apps/api

      - name: Smoke test — modules load without errors
        run: |
          node -e "
            require('./apps/api/src/data/sectors');
            require('./apps/api/src/ingest/feedMonitor');
            require('./apps/api/src/ml/featureEngineering');
            require('./apps/api/src/ml/riskEngine');
            require('./apps/api/src/ml/backtest');
            require('./apps/api/src/screener/rankingService');
            console.log('All modules loaded OK');
          "

      - name: Run data quality check
        run: |
          node -e "
            (async () => {
              const t0 = Date.now();
              const { initDb } = require('./apps/api/src/db/connection');
              await initDb();
              const t1 = Date.now();
              const { assessAllFeedQuality } = require('./apps/api/src/ingest/feedMonitor');
              const report = assessAllFeedQuality();
              const t2 = Date.now();
              console.log('=== Feed Quality Report ===');
              console.log('Total instruments:', report.totalInstruments);
              console.log('Healthy:', report.healthy);
              console.log('Degraded:', report.degraded);
              console.log('Missing:', report.missing);
              console.log('Health %:', report.healthPct);
              console.log('Timing ms:', {
                initDb: t1 - t0,
                assessAllFeedQuality: t2 - t1,
                total: t2 - t0,
              });
              if (report.details.length > 0) {
                console.log('\n--- Issues ---');
                for (const d of report.details.slice(0, 10)) {
                  console.log(d.ticker, ':', d.daily.issues.join(', '));
                }
              }
              const availableCount = report.healthy + report.degraded;
              const availablePct = report.totalInstruments > 0
                ? (availableCount / report.totalInstruments) * 100
                : 0;
              console.log('Available count:', availableCount);
              console.log('Available %:', availablePct.toFixed(2));

              if (report.totalInstruments === 0) {
                console.error('CRITICAL: No instruments in quality report.');
                process.exit(1);
              }

              if (report.missing >= 5 || availablePct < 95) {
                console.error('CRITICAL: Data availability gate failed (missing >= 5 or available < 95%).');
                process.exit(1);
              }

              if (report.healthPct < 50) {
                console.warn('WARNING: Feed health below 50% (stale/degraded), but availability gate passed.');
              }
            })().catch((err) => {
              console.error(err);
              process.exit(1);
            });
          "

      - name: Verify ML models exist
        run: |
          node -e "
            (async () => {
              const t0 = Date.now();
              const { initDb, query } = require('./apps/api/src/db/connection');
              await initDb();
              const t1 = Date.now();
              const models = query(\"SELECT COUNT(*) as n FROM model_registry WHERE status = 'active'\");
              const t2 = Date.now();
              const n = models[0]?.n || 0;
              console.log('Active ML models:', n);
              console.log('Timing ms:', {
                initDb: t1 - t0,
                modelQuery: t2 - t1,
                total: t2 - t0,
              });
              if (n === 0) {
                console.warn('WARNING: No active ML models found');
              }
            })().catch((err) => {
              console.error(err);
              process.exit(1);
            });
          "

      - name: Production freshness gate
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          API_BASE_URL: ${{ secrets.HEROKU_API_BASE_URL }}
        run: |
          set -euo pipefail

          DEFAULT_BASE_URL="https://bloomberpl-da6e13c64b4e.herokuapp.com"
          RAW_BASE_URL="${API_BASE_URL:-}"
          if [ -z "$RAW_BASE_URL" ]; then
            echo "HEROKU_API_BASE_URL secret is required for production freshness gate." >&2
            exit 1
          fi
          SANITIZED_BASE_URL="$(printf '%s' "$RAW_BASE_URL" | sed "s/\r//g; s/^[[:space:]]*//; s/[[:space:]]*$//; s/^['\"]//; s/['\"]$//")"
          if [ -n "$SANITIZED_BASE_URL" ] && [[ ! "$SANITIZED_BASE_URL" =~ ^https?:// ]]; then
            SANITIZED_BASE_URL="https://${SANITIZED_BASE_URL}"
          fi
          BASE_URL="${SANITIZED_BASE_URL:-$DEFAULT_BASE_URL}"

          HEALTH_URL="${BASE_URL%/}/api/health"
          WORKER_URL="${BASE_URL%/}/api/worker/status"

          echo "Checking production freshness on: ${BASE_URL}"

          health_code="$(curl -sS --connect-timeout 12 --max-time 30 -o /tmp/prod-health.json -w "%{http_code}" "$HEALTH_URL")"
          worker_code="$(curl -sS --connect-timeout 12 --max-time 30 -o /tmp/prod-worker.json -w "%{http_code}" "$WORKER_URL")"

          echo "Health HTTP: ${health_code}"
          echo "Worker HTTP: ${worker_code}"

          if [ "$health_code" -lt 200 ] || [ "$health_code" -ge 300 ]; then
            echo "Health endpoint check failed" >&2
            cat /tmp/prod-health.json || true
            exit 1
          fi

          if [ "$worker_code" -lt 200 ] || [ "$worker_code" -ge 300 ]; then
            echo "Worker status endpoint check failed" >&2
            cat /tmp/prod-worker.json || true
            exit 1
          fi

          node -e '
            const fs = require("fs");
            const health = JSON.parse(fs.readFileSync("/tmp/prod-health.json", "utf8"));
            const worker = JSON.parse(fs.readFileSync("/tmp/prod-worker.json", "utf8"));
            const mode = worker.currentMode || "unknown";
            const maxAgeSec = mode === "market" ? 1800 : 7200;
            const failures = [];

            if (!worker.isRunning) {
              failures.push("worker is not running");
            }

            if (typeof health.lastIngestAgeSec !== "number") {
              failures.push("lastIngestAgeSec missing in /api/health");
            } else if (health.lastIngestAgeSec > maxAgeSec) {
              failures.push(`lastIngestAgeSec=${health.lastIngestAgeSec} exceeds threshold=${maxAgeSec} in mode=${mode}`);
            }

            const freshness = health.freshness || {};
            if (health.dataStale && freshness.total > 0 && freshness.stale >= freshness.total) {
              failures.push("all instruments stale and dataStale=true");
            }

            const blockers = Array.isArray(health.recoveryBlockers) ? health.recoveryBlockers : [];
            if (blockers.includes("Worker scheduler is not running")) {
              failures.push("health reports worker scheduler is not running");
            }

            console.log("Freshness summary:", {
              mode,
              lastIngestAgeSec: health.lastIngestAgeSec,
              maxAgeSec,
              stale: freshness.stale,
              total: freshness.total,
              workerRunning: worker.isRunning,
              blockers,
            });

            if (failures.length > 0) {
              console.error("Production freshness gate failed:");
              for (const item of failures) console.error(" -", item);
              process.exit(1);
            }

            console.log("Production freshness gate passed.");
          '
